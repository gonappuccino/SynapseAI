<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynapseAI — Demo Hook 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg: #f5f4f0;
    --cobalt: #6366f1;
    --cobalt-pastel: #a5b4fc;
  }

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:'Outfit',sans-serif;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    opacity:0.022;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
    pointer-events:none;
    z-index:999;
  }

  body::after{
    content:'';
    position:fixed;
    top:42%;
    left:50%;
    width:1000px;
    height:1000px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(99,102,241,0.045) 0%,transparent 65%);
    pointer-events:none;
    z-index:0;
  }

  .stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
  }

  .line{
    opacity:0;
    transform:translateY(24px);
    font-size:clamp(2rem, 4vw, 3.6rem);
    font-weight:300;
    letter-spacing:-0.02em;
    line-height:1.8;
    color:var(--cobalt);
    text-align:center;
    max-width:80vw;
  }

  .line.show{
    animation:fadeUp 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .line em{
    font-style:italic;
    font-weight:600;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(24px) }
    to  { opacity:1; transform:translateY(0)    }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="line">Finally, reinforce what you've learned with a <em>post-quiz</em>.</div>
</div>

<script>
  window.addEventListener('load', () => {
    document.querySelectorAll('.line')
      .forEach(el => el.classList.add('show'));
  });
</script>
</body>
</html>
