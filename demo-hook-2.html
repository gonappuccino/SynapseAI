<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynapseAI — Demo Hook 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg: #f5f4f0;
    --cobalt: #6366f1;
    --cobalt-soft: #818cf8;
    --cobalt-pastel: #a5b4fc;
    --cobalt-wash: #c7d2fe;
    --cobalt-ghost: #e0e7ff;
  }

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--bg);
    font-family:'Outfit',sans-serif;
  }

  /* Noise grain */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    opacity:0.022;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;
    pointer-events:none;
    z-index:999;
  }

  /* Soft radial glow behind text */
  body::after{
    content:'';
    position:fixed;
    top:42%;
    left:50%;
    width:1000px;
    height:1000px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(99,102,241,0.045) 0%,transparent 65%);
    pointer-events:none;
    z-index:0;
  }

  .stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    gap:0;
  }

  /* ── Lines ── */
  .line{
    opacity:0;
    transform:translateY(24px);
    font-size:clamp(2rem, 4vw, 3.6rem);
    font-weight:300;
    letter-spacing:-0.02em;
    line-height:1.8;
    color:var(--cobalt-pastel);
    text-align:center;
  }

  .line.show{
    animation:fadeUp 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .line:nth-child(1){ animation-delay:0.5s }
  .line:nth-child(2){ animation-delay:1.8s }
  .line:nth-child(3){ animation-delay:3.2s }

  /* Line 1 & 2: light pastel cobalt */
  .line:nth-child(1),
  .line:nth-child(2){
    font-weight:300;
    color:var(--cobalt-pastel);
  }

  /* "dense" italic emphasis */
  .line em{
    font-style:italic;
    font-weight:300;
    color:var(--cobalt-soft);
  }

  /* Line 3: the punch — big, bold, cobalt */
  .line:nth-child(3){
    font-size:clamp(2.6rem, 5.5vw, 5rem);
    font-weight:700;
    letter-spacing:-0.03em;
    color:var(--cobalt);
    margin-top:8px;
  }


  /* ── Decorative line ── */
  .divider{
    width:0;
    height:1px;
    background:var(--cobalt-wash);
    margin:32px 0 26px;
    opacity:0;
  }
  .divider.show{
    animation:lineGrow 0.9s 4.8s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  /* ── Brand mark ── */
  .brand{
    opacity:0;
    transform:translateY(12px);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--cobalt-pastel);
  }
  .brand.show{
    animation:fadeUp 0.9s 5.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  /* ── Keyframes ── */
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(24px) }
    to  { opacity:1; transform:translateY(0)    }
  }
  @keyframes lineGrow{
    from{ opacity:0; width:0    }
    to  { opacity:1; width:56px }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="line">Here's a lecture note on neural networks.</div>
  <div class="line">It's <em>dense</em>. Hard to follow.</div>
  <div class="line">Now watch this.</div>
  <div class="divider"></div>
  <div class="brand">SynapseAI</div>
</div>

<script>
  window.addEventListener('load', () => {
    document.querySelectorAll('.line, .divider, .brand')
      .forEach(el => el.classList.add('show'));
  });
</script>
</body>
</html>
